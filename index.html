<body>
<div id="dot"><i></i><span>offline</span></div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ============================================================
   ContaRep — contatore rep live per gare (judge → scoreboard)
   Un solo file. Sync in tempo reale via MQTT-over-WebSocket
   (broker pubblici, nessuna configurazione). Funziona anche
   offline su un singolo dispositivo.
   ============================================================ */

/* ---------- storage ---------- */
const LS = "contarep.v1";
let db = { heats: {} };
try { db = JSON.parse(localStorage.getItem(LS)) || { heats: {} }; } catch (e) {}
if (!db.heats) db.heats = {};
function save() { try { localStorage.setItem(LS, JSON.stringify(db)); } catch (e) {} }

const rnd = (n, chars) => Array.from({ length: n }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
const newCode = () => rnd(5, "ABCDEFGHJKMNPQRSTUVWXYZ23456789");
const newId = () => "a" + rnd(8, "abcdefghijklmnopqrstuvwxyz0123456789");
function fmtMs(ms) { if (ms == null) return ""; const s = Math.floor(ms / 1000); return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }
const CATS = [["elite", "ELITE"], ["rx", "RX"], ["scaled", "SCALED"]];
function catOk(c) { return (c === "elite" || c === "rx" || c === "scaled") ? c : ""; }
function catChip(c) { return c ? '<span class="catc ' + c + '">' + c.toUpperCase() + "</span>" : ""; }
function modeLbl(w) { return w === "amrap" ? "AMRAP" : (w === "emom" ? "EMOM" : "FOR TIME"); }
function parseSteps(txt) {
  return String(txt || "").split("\n").map(s => s.trim()).filter(Boolean).slice(0, 40).map(line => {
    const m = line.match(/^(\d+)\s*[x×]?\s*(.+)$/i);
    return m ? { n: +m[1], label: m[2] } : { n: null, label: line };
  });
}
function capReached(h) { return !!(h && h.startAt && h.capMin && (Date.now() - h.startAt) >= h.capMin * 60000); }
function tickTxt(t0, capMin) {
  const e = Date.now() - t0, cap = (capMin || 0) * 60000;
  if (e < 0) return "VIA IN " + Math.ceil(-e / 1000);
  if (cap && e >= cap) return "TIME CAP";
  return fmtMs(e) + (cap ? " / " + fmtMs(cap) : "");
}
function heatPhase(h) {
  if (!h || !h.startAt) return "idle";
  const e = Date.now() - h.startAt;
  if (e < 0) return "pre";
  if (h.capMin && e >= h.capMin * 60000) return "cap";
  return "run";
}
let actx = null;
function beep(n) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const now = actx.currentTime;
    for (let i = 0; i < n; i++) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.frequency.value = (i === n - 1) ? 1250 : 880;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(.35, now + i * .38);
      g.gain.exponentialRampToValueAtTime(.001, now + i * .38 + .3);
      o.start(now + i * .38); o.stop(now + i * .38 + .33);
    }
  } catch (e) {}
}
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const DEVICE = (() => {
  let d = null;
  try { d = localStorage.getItem("contarep.dev"); } catch (e) {}
  if (!d) { d = "d" + rnd(8, "abcdefghijklmnopqrstuvwxyz0123456789"); try { localStorage.setItem("contarep.dev", d); } catch (e) {} }
  return d;
})();

function getJname() { try { return localStorage.getItem("contarep.jname") || ""; } catch (e) { return ""; } }
function setJname(v) { try { localStorage.setItem("contarep.jname", v); } catch (e) {} }
function getHeat(code) { return db.heats[code] || null; }
function ensureHeat(code) {
  if (!db.heats[code]) db.heats[code] = { code, name: "", createdAt: Date.now(), closed: false, startAt: null, capMin: null, wod: "fortime", steps: [], wodTxt: "", athletes: [], counts: {}, judges: {}, assign: {}, metaT: 0 };
  return db.heats[code];
}

/* ---------- toast ---------- */
let toastTm = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTm); toastTm = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ---------- sync (MQTT over WSS, broker pubblici) ---------- */
const BROKERS = [
  "wss://broker.emqx.io:8084/mqtt",
  "wss://broker.hivemq.com:8884/mqtt",
  "wss://test.mosquitto.org:8081"
];
const TOPIC = code => "contarep/v1/" + code;
let client = null, connCode = null, brokerIdx = 0, failCount = 0;
let libState = "no"; // no | loading | ok | fail
let recvT = {};      // topic -> t più recente ricevuto (per re-publish dopo connect)

function setDot(state, label) {
  const d = document.getElementById("dot");
  d.className = state; d.querySelector("span").textContent = label;
}

function loadLib(cb) {
  if (window.mqtt) { libState = "ok"; cb(); return; }
  if (libState === "loading") return;
  libState = "loading";
  const srcs = [
    "https://unpkg.com/mqtt@5/dist/mqtt.min.js",
    "https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"
  ];
  let i = 0;
  const tryNext = () => {
    if (i >= srcs.length) { libState = "fail"; setDot("", "offline"); return; }
    const s = document.createElement("script");
    s.src = srcs[i++];
    s.onload = () => { libState = "ok"; cb(); };
    s.onerror = () => tryNext();
    document.head.appendChild(s);
  };
  tryNext();
}

function ensureSync(code) {
  if (connCode === code && client) return;
  disconnect();
  connCode = code; brokerIdx = 0; failCount = 0;
  setDot("conn", "connessione…");
  if (libState === "fail") libState = "no"; // riprova: magari ora c'è rete
  loadLib(() => connect(code));
}

function connect(code) {
  if (!window.mqtt || connCode !== code) return;
  const url = BROKERS[brokerIdx % BROKERS.length];
  let connected = false;
  try {
    client = mqtt.connect(url, {
      clientId: "contarep_" + DEVICE + "_" + rnd(4, "0123456789"),
      clean: true, connectTimeout: 7000, reconnectPeriod: 4000, keepalive: 30
    });
  } catch (e) { rotateBroker(code); return; }

  client.on("connect", () => {
    connected = true; failCount = 0;
    setDot("on", "live");
    client.subscribe(TOPIC(code) + "/#", { qos: 0 });
    setTimeout(() => republishNewer(code), 2500);
  });
  client.on("message", (topic, payload) => onMsg(code, topic, payload));
  client.on("close", () => {
    if (connCode !== code) return;
    setDot("conn", "riconnessione…");
    if (!connected) { failCount++; if (failCount >= 2) rotateBroker(code); }
  });
  client.on("error", () => {});
}

function rotateBroker(code) {
  disconnectKeepCode();
  brokerIdx++; failCount = 0;
  setDot("conn", "riconnessione…");
  setTimeout(() => { if (connCode === code) connect(code); }, brokerIdx < BROKERS.length ? 600 : 2500);
}
function disconnectKeepCode() {
  if (client) { try { client.end(true); } catch (e) {} client = null; }
}
function disconnect() {
  disconnectKeepCode();
  connCode = null; recvT = {};
  setDot("", "pronto — entra in un heat");
}

function pub(topic, obj) {
  if (client && client.connected) {
    try { client.publish(topic, JSON.stringify(obj), { qos: 0, retain: true }); } catch (e) {}
  }
}
function pubMeta(h) {
  pub(TOPIC(h.code) + "/meta", { name: h.name, athletes: h.athletes, closed: !!h.closed, startAt: h.startAt || null, capMin: h.capMin || null, wod: h.wod || "fortime", steps: h.steps || [], wodTxt: h.wodTxt || "", assign: h.assign || {}, t: h.metaT });
}
function pubCount(h, aid) {
  const c = h.counts[aid] || { r: 0, t: 0 };
  pub(TOPIC(h.code) + "/c/" + aid, { r: c.r, t: c.t, fin: (typeof c.fin === "number") ? c.fin : null, by: DEVICE });
}
function pubPresence(code) {
  const jn = getJname();
  if (!jn || !client || !client.connected) return;
  if (route().v !== "judge") return; // solo i dispositivi in modalità judge si presentano
  pub(TOPIC(code) + "/j/" + DEVICE, { name: jn, t: nowT() });
}
function republishNewer(code) {
  const h = getHeat(code);
  if (!h || !client || !client.connected) return;
  pubPresence(code);
  if ((h.metaT || 0) > (recvT[TOPIC(code) + "/meta"] || 0)) pubMeta(h);
  for (const aid in h.counts) {
    if ((h.counts[aid].t || 0) > (recvT[TOPIC(code) + "/c/" + aid] || 0)) pubCount(h, aid);
  }
}

function onMsg(code, topic, payload) {
  let m; try { m = JSON.parse(payload.toString()); } catch (e) { return; }
  if (!m || typeof m.t !== "number") return;
  recvT[topic] = Math.max(recvT[topic] || 0, m.t);
  const h = ensureHeat(code);
  const base = TOPIC(code);
  let changed = false;
  if (topic === base + "/meta") {
    if (m.t > (h.metaT || 0)) {
      h.name = m.name || ""; h.closed = !!m.closed;
      h.startAt = (typeof m.startAt === "number") ? m.startAt : null;
      h.capMin = (typeof m.capMin === "number" && m.capMin > 0) ? m.capMin : null;
      h.wod = (m.wod === "amrap" || m.wod === "emom") ? m.wod : "fortime";
      h.steps = Array.isArray(m.steps) ? m.steps.filter(s => s && s.label).slice(0, 40).map(s => ({ n: (typeof s.n === "number") ? s.n : null, label: String(s.label) })) : [];
      h.wodTxt = (typeof m.wodTxt === "string") ? m.wodTxt : "";
      h.assign = (m.assign && typeof m.assign === "object") ? m.assign : {};
      if (Array.isArray(m.athletes)) h.athletes = m.athletes.filter(a => a && a.id).map(a => ({ id: String(a.id), name: String(a.name || ""), cat: catOk(a.cat) }));
      h.metaT = m.t; changed = true;
    }
  } else if (topic.indexOf(base + "/j/") === 0) {
    const dev = topic.slice((base + "/j/").length);
    if (!h.judges) h.judges = {};
    const cur = h.judges[dev] || { t: 0 };
    if (m.t > cur.t) {
      if (m.gone) {
        if (h.judges[dev]) { delete h.judges[dev]; changed = true; }
      } else {
        const newName = String(m.name || "Judge");
        const isNew = cur.name !== newName; // nuovo giudice o nome cambiato
        h.judges[dev] = { name: newName, t: m.t };
        if (isNew) changed = true; else save(); // solo refresh timestamp: niente ridisegno
      }
    }
  } else if (topic.indexOf(base + "/c/") === 0) {
    const aid = topic.slice((base + "/c/").length);
    const cur = h.counts[aid] || { r: 0, t: 0 };
    if (m.t > cur.t) { h.counts[aid] = { r: Math.max(0, m.r | 0), t: m.t, fin: (typeof m.fin === "number") ? m.fin : null }; changed = true; }
  }
  if (changed) {
    save();
    if (topic === base + "/meta" || topic.indexOf(base + "/j/") === 0) render();
    else softRender();
  }
}

/* ---------- azioni ---------- */
let lastT = 0;
function nowT() { lastT = Math.max(Date.now(), lastT + 1); return lastT; } // timestamp sempre crescente
function bumpMeta(h) { h.metaT = nowT(); save(); pubMeta(h); }

function addRep(code, aid, delta) {
  const h = getHeat(code); if (!h || h.closed || capReached(h)) return;
  if (!h.startAt || Date.now() < h.startAt) { toast("Si conta dal VIA dell'head judge"); return; }
  const cur = h.counts[aid] || { r: 0, t: 0 };
  if (cur.fin != null) return; // atleta arrivato: conteggio bloccato
  const r = Math.max(0, (cur.r | 0) + delta);
  h.counts[aid] = { r, t: nowT(), fin: null };
  save(); pubCount(h, aid);
  if (navigator.vibrate) { try { navigator.vibrate(delta > 0 ? 25 : [50, 40, 50]); } catch (e) {} }
  softRender();
}

window.startTimer = (code) => {
  const h = getHeat(code); if (!h || h.closed) return;
  h.startAt = Date.now() + 10000; // countdown 10s: "VIA IN..." su tutti i dispositivi
  bumpMeta(h); render();
  toast("Si parte tra 10 secondi!");
};
window.resetTimer = (code) => {
  if (!confirm("Azzerare il timer del WOD per tutti?")) return;
  const h = getHeat(code); if (!h) return;
  h.startAt = null; bumpMeta(h); render();
};
window.finishAth = (code, aid) => {
  const h = getHeat(code); if (!h || h.closed || !h.startAt || Date.now() < h.startAt || capReached(h)) return;
  const cur = h.counts[aid] || { r: 0, t: 0 };
  if (cur.fin != null) return;
  h.counts[aid] = { r: cur.r | 0, t: nowT(), fin: Date.now() - h.startAt };
  save(); pubCount(h, aid);
  if (navigator.vibrate) { try { navigator.vibrate([80, 50, 80]); } catch (e) {} }
  render();
};
window.unfinishAth = (code, aid) => {
  if (!confirm("Annullare l'arrivo di questo atleta?")) return;
  const h = getHeat(code); if (!h || h.closed) return;
  const cur = h.counts[aid] || { r: 0, t: 0 };
  h.counts[aid] = { r: cur.r | 0, t: nowT(), fin: null };
  save(); pubCount(h, aid); render();
};

function route() {
  const p = location.hash.replace(/^#\/?/, "").split("/").filter(Boolean);
  if (p[0] === "new") return { v: "new" };
  if (p[0] === "h" && p[1]) {
    const code = p[1].toUpperCase();
    return { v: p[2] || "hub", code, aid: p[3] || null };
  }
  return { v: "home" };
}

/* softRender: durante i tap del giudice aggiorna solo il numero (niente flicker) */
let lastView = "";
function softRender() {
  const r = route();
  const key = r.v + "/" + (r.code || "");
  if (key !== lastView) { render(); return; }
  if (r.v === "judge" && r.aid) {
    const h = getHeat(r.code); if (!h) return render();
    const asg = (h.assign || {})[DEVICE];
    if (asg && asg !== r.aid) return render(); // riassegnato: segui l'head judge
    const c = h.counts[r.aid] || { r: 0 };
    const el = document.getElementById("bigcount");
    if (el && c.fin == null && !h.closed && !capReached(h)) {
      el.textContent = c.r | 0;
      const wb = document.getElementById("wodbox");
      if (wb) {
        const d0 = wb.querySelector("details");
        const wasOpen = !!(d0 && d0.open);
        wb.innerHTML = stepsWidget(h, c.r | 0);
        const d1 = wb.querySelector("details");
        if (d1 && wasOpen) d1.open = true;
      }
    }
    else render();
  } else {
    render();
  }
}

/* ---------- scaletta WOD ---------- */
function stepsWidget(h, count) {
  const st = h.steps || [];
  if (!st.length) return "";
  const li = (s, i, curIdx, doneUpTo) =>
    `<li class="${i < doneUpTo ? "done" : ""}${i === curIdx ? " cur" : ""}" data-lb="${esc((s.n ? s.n + " " : "") + s.label)}">${s.n ? s.n + " " : ""}${esc(s.label)}</li>`;
  const olFull = (curIdx, doneUpTo) => "<ol>" + st.map((s, i) => li(s, i, curIdx, doneUpTo)).join("") + "</ol>";
  if (h.wod === "emom") {
    if (!h.startAt || Date.now() < h.startAt) return `<div class="wodbox"><div class="wodhead">📋 EMOM — la scaletta gira con lo START</div>${olFull(-1, 0)}</div>`;
    if (capReached(h)) return `<div class="wodbox"><div class="wodhead">📋 EMOM — TIME CAP</div><div class="wodcur done">✅ WOD concluso</div>${olFull(-1, st.length)}</div>`;
    const n = st.length;
    const elMin = Math.floor((Date.now() - h.startAt) / 60000);
    const idx = elMin % n;
    return `<div class="wodbox" data-emom="${h.startAt}" data-n="${n}">
      <div class="wodhead">📋 EMOM — minuto ${elMin + 1}</div>
      <div class="wodcur">▶ ${st[idx].n ? st[idx].n + " " : ""}${esc(st[idx].label)}</div>
      <details><summary>tutta la scaletta</summary>${olFull(idx, 0)}</details></div>`;
  }
  const nums = st.every(s => s.n != null);
  if (!nums) return `<div class="wodbox"><div class="wodhead">📋 Scaletta WOD</div>${olFull(-1, 0)}</div>`;
  const total = st.reduce((a, s) => a + s.n, 0);
  let round = 1, c = count | 0;
  if (h.wod === "amrap" && total > 0) { round = Math.floor(c / total) + 1; c = c % total; }
  if (h.wod !== "amrap" && c >= total) {
    return `<div class="wodbox"><div class="wodhead">📋 step ${st.length}/${st.length}</div>
      <div class="wodcur done">✅ Scaletta completa — 🏁 ferma il tempo!</div>
      <details><summary>tutta la scaletta</summary>${olFull(-1, st.length)}</details></div>`;
  }
  let acc = 0, idx = st.length - 1, rem = 0;
  for (let i = 0; i < st.length; i++) { if (c < acc + st[i].n) { idx = i; rem = acc + st[i].n - c; break; } acc += st[i].n; }
  const next = st[idx + 1];
  return `<div class="wodbox">
    <div class="wodhead">📋 ${h.wod === "amrap" ? "ROUND " + round + " · " : ""}step ${idx + 1}/${st.length}</div>
    <div class="wodcur">▶ ${st[idx].n} ${esc(st[idx].label)} <span>mancano ${rem}</span></div>
    <div class="wodnext">${next ? "poi: " + next.n + " " + esc(next.label) : (h.wod === "amrap" ? "poi: si riparte (round " + (round + 1) + ")" : "ultimo step")}</div>
    <details><summary>tutta la scaletta</summary>${olFull(idx, idx)}</details>
  </div>`;
}

function vJudge(code, aid) {
  const h = ensureHeat(code); save();
  ensureSync(code); keepAwake();
  const ft = h.wod === "fortime";
  const jn = getJname();
  if (!jn) {
    app().innerHTML = `
      ${header("")}
      <h2>Ciao judge! 👨‍⚖️</h2>
      <div class="card">
        <p class="muted">Dì all'head judge chi sei: comparirai sul suo pannello e ti assegnerà l'atleta da giudicare.</p>
        <input type="text" id="jnamein" placeholder="Il tuo nome (es. Ale C.)" maxlength="24" style="margin-top:10px">
        <button class="btn" style="margin-top:12px" onclick="saveJname('${code}')">Continua</button>
      </div>`;
    const inp = document.getElementById("jnamein");
    inp.focus();
    inp.addEventListener("keydown", e => { if (e.key === "Enter") saveJname(code); });
    return;
  }
  pubPresence(code);
  const assigned = (h.assign || {})[DEVICE] || null;
  const okAssigned = assigned && h.athletes.some(a => a.id === assigned);
  if (!aid) {
    if (okAssigned) { nav("h/" + code + "/judge/" + assigned); return; }
    app().innerHTML = `
      ${header("")}
      <h2>Ciao ${esc(jn)}!</h2>
      <div class="card" style="text-align:center">
        <div class="waitpulse">⏳</div>
        <h3>In attesa di assegnazione</h3>
        <p class="muted">Sei collegato all'heat <b style="color:var(--acc)">${esc(code)}</b>${h.name ? " — " + esc(h.name) : ""}.<br>
        L'head judge ti sta per assegnare un atleta: appena lo fa, questa schermata si apre da sola sul suo contatore.</p>
      </div>
      <p class="muted" style="margin:16px 4px 8px"><b>Oppure scegli tu l'atleta</b> — puoi iniziare subito, l'head judge può sempre riassegnarti:</p>
      <div class="pick">
        ${h.athletes.map(a => {
          const c = h.counts[a.id] || { r: 0 };
          return `<button class="btn sec" onclick="nav('h/${code}/judge/${a.id}')">
          <span>${esc(a.name)}${catChip(a.cat)}</span><span style="color:var(--dim)">${c.fin != null ? "🏁 " + fmtMs(c.fin) : c.r + " rep"}</span></button>`;
        }).join("") || '<p class="muted">Ancora nessun atleta ricevuto… controlla che il pallino in alto sia verde.</p>'}
      </div>
      <p class="muted center" style="margin-top:14px">Non sei ${esc(jn)}? <button class="linkbtn" onclick="changeJname()">cambia nome</button>
      · Sei l'head judge? <button class="linkbtn" onclick="nav('h/${code}')">apri il pannello</button></p>`;
    return;
  }
  if (okAssigned && assigned !== aid) { nav("h/" + code + "/judge/" + assigned); return; }
  const a = h.athletes.find(x => x.id === aid);
  if (!a) { nav("h/" + code + "/judge"); return; }
  const c = h.counts[aid] || { r: 0 };
  const fin = c.fin != null;
  const capd = capReached(h);
  const running = h.startAt && Date.now() >= h.startAt && !capd;
  const locked = h.closed || fin || capd || !running;
  const mine = assigned === aid;
  let timerHtml = "";
  if (fin) timerHtml = `<p class="jtimer done">🏁 ${fmtMs(c.fin)}</p>`;
  else if (capd) timerHtml = `<p class="jtimer done">⏰ TIME CAP</p>`;
  else if (h.startAt) timerHtml = `<p class="jtimer" data-tick="${h.startAt}" data-cap="${h.capMin || 0}">${tickTxt(h.startAt, h.capMin)}</p>`;
  else timerHtml = `<p class="jtimer off">in attesa dello START dell'head judge</p>`;
  app().innerHTML = `
    ${mine ? "" : header("h/" + code + "/judge")}
    <p class="jname">${esc(a.name)}${catChip(a.cat)}</p>
    <p class="jsub">${esc(h.name || "heat " + code)} · ${modeLbl(h.wod)}${mine ? " · 👨‍⚖️ " + esc(jn) : ""}${h.closed ? " — HEAT CHIUSO" : (fin ? " — ARRIVATO" : (capd ? " — TIME CAP" : ""))}</p>
    ${timerHtml}
    <div id="wodbox">${stepsWidget(h, c.r | 0)}</div>
    <div class="count" id="bigcount">${c.r | 0}</div>
    <div class="tapzone ${locked ? "locked" : ""}" id="tapzone">
      <div class="flash" id="flash"></div>
      <div class="plus">+1</div>
      <div class="lbl">${running ? "TOCCA PER CONTARE" : "SI CONTA DAL VIA"}</div>
    </div>
    ${ft && running && !fin && !h.closed ? `<button class="btn fin" onclick="finishAth('${code}','${aid}')">🏁 ARRIVO — ferma il tempo</button>` : ""}
    ${ft && fin && !h.closed ? `<button class="btn warn" style="margin-top:12px" onclick="unfinishAth('${code}','${aid}')">Annulla arrivo (${fmtMs(c.fin)})</button>` : ""}
    <div class="row" style="margin-top:12px">
      <button class="btn sec grow" ${locked ? "disabled" : ""} onclick="addRep('${code}','${aid}',-1)">−1 correzione</button>
      ${mine ? `<span class="tagchip" style="padding:8px 12px">ASSEGNATO A TE</span>` : `<button class="btn sec small" onclick="nav('h/${code}/judge')">cambia atleta</button>`}
    </div>
    ${(fin || h.closed || capd) ? `<button class="btn" style="margin-top:14px" onclick="nav('')">✅ FINE — il tuo lavoro è fatto, torna alla home</button>` : ""}
    <p class="muted center" style="margin-top:16px"><button class="linkbtn" onclick="exitJudge()">esci e torna alla home</button></p>`;
  const tz = document.getElementById("tapzone");
  tz.addEventListener("pointerdown", e => {
    e.preventDefault();
    addRep(code, aid, 1);
    const f = document.getElementById("flash");
    f.classList.remove("go"); void f.offsetWidth; f.classList.add("go");
  });
}
window.saveJname = (code) => {
  const v = (document.getElementById("jnamein").value || "").trim();
  if (!v) { toast("Scrivi il tuo nome"); return; }
  setJname(v); render(true);
};
window.changeJname = () => { setJname(""); render(true); };
window.exitJudge = () => {
  if (!confirm("Uscire e tornare alla home? I conteggi restano salvati e sincronizzati.")) return;
  if (connCode && client && client.connected) {
    try { pub(TOPIC(connCode) + "/j/" + DEVICE, { gone: true, t: nowT() }); } catch (e) {}
  }
  nav("");
};

function vGrid(code) {
  const h = ensureHeat(code); save();
  ensureSync(code); keepAwake();
  const capd = capReached(h);
  const timerTop = h.startAt
    ? `<span class="cd" data-tick="${h.startAt}" data-cap="${h.capMin || 0}">${tickTxt(h.startAt, h.capMin)}</span>`
    : (h.closed ? "" : `<button class="btn small" onclick="startTimer('${code}')">▶ START</button>`);
  app().innerHTML = `
    ${header("h/" + code)}
    <div class="bhead"><h2>${esc(h.name || "Heat " + code)}</h2>
      <span class="cd">${esc(code)}</span>${timerTop}${h.closed ? '<span class="final">CHIUSO</span>' : ""}</div>
    <p class="muted" style="margin:4px 0 12px">Griglia giudici — un pulsante per atleta</p>
    <div class="ggrid">
      ${h.athletes.map(a => {
        const c = h.counts[a.id] || { r: 0 };
        const fin = c.fin != null;
        const running = h.startAt && Date.now() >= h.startAt && !capd;
        const lk = h.closed || fin || capd || !running;
        return `<div class="gtile">
          <div class="nm">${esc(a.name)}${catChip(a.cat)}</div>
          <div class="ct">${fin ? '<span class="ftime">🏁 ' + fmtMs(c.fin) + "</span>" : c.r | 0}</div>
          <button class="plusb" ${lk ? "disabled" : ""} data-aid="${a.id}">+1</button>
          ${h.wod === "fortime" && h.startAt && Date.now() >= h.startAt && !capd && !fin && !h.closed ? `<button class="minusb" onclick="finishAth('${code}','${a.id}')">🏁 arrivo</button>` : ""}
          ${fin && !h.closed ? `<button class="minusb" onclick="unfinishAth('${code}','${a.id}')">annulla arrivo</button>` : ""}
          ${!lk ? `<button class="minusb" onclick="addRep('${code}','${a.id}',-1)">−1 correzione</button>` : ""}
        </div>`;
      }).join("") || '<p class="muted">Nessun atleta ancora…</p>'}
    </div>`;
  document.querySelectorAll(".plusb").forEach(b => {
    b.addEventListener("pointerdown", e => { e.preventDefault(); addRep(code, b.dataset.aid, 1); });
  });
}

function vBoard(code) {
  const h = ensureHeat(code); save();
  ensureSync(code); keepAwake();
  const mkRows = list => list
    .map(a => { const c = h.counts[a.id] || { r: 0 }; return { id: a.id, name: a.name, cat: catOk(a.cat), r: c.r | 0, fin: (c.fin != null) ? c.fin : null }; })
    .sort((x, y) => {
      if (x.fin != null && y.fin != null) return x.fin - y.fin;
      if (x.fin != null) return -1;
      if (y.fin != null) return 1;
      return y.r - x.r;
    });
  const usedCats = [...CATS.map(c => c[0]), ""].filter(cv => h.athletes.some(a => catOk(a.cat) === cv));
  const grouped = usedCats.length > 1;
  const max = Math.max(1, ...h.athletes.map(a => (h.counts[a.id] || { r: 0 }).r | 0));
  const capd = capReached(h);
  const timerTop = h.startAt
    ? `<span class="cd big" data-tick="${h.startAt}" data-cap="${h.capMin || 0}">${tickTxt(h.startAt, h.capMin)}</span>`
    : (h.closed ? "" : `<button class="btn small" onclick="startTimer('${code}')">▶ START WOD</button>`);
  app().innerHTML = `
    ${header("h/" + code)}
    <div class="bhead">
      <h2>${esc(h.name || "Heat " + code)}</h2>
      <span class="cd">${esc(code)}</span>
      ${timerTop}
      ${h.closed ? '<span class="final">FINALE</span>' : (capd ? '<span class="final">TIME CAP</span>' : "")}
    </div>
    <p class="muted" style="margin:2px 0 8px">Classifica live${grouped ? " per categoria" : ""}${h.startAt ? " — 🏁 = tempo fermato" : ""}</p>
    ${usedCats.map(cv => {
      const rows = mkRows(h.athletes.filter(a => catOk(a.cat) === cv));
      if (!rows.length) return "";
      return (grouped ? `<div class="cathead">${cv ? cv.toUpperCase() : "ALTRI"}</div>` : "") + rows.map((a, i) => `
      <div class="brow p${i + 1}">
        <div class="bar" style="width:${(a.r / max) * 100}%"></div>
        <div class="pos">${i + 1}</div>
        <div class="nm">${esc(a.name)}${grouped ? "" : catChip(a.cat)}</div>
        <div class="rp">${a.fin != null ? "🏁 " + fmtMs(a.fin) : a.r + '<small>rep</small>' + (capd && h.wod === "fortime" ? '<small style="color:var(--amber)">CAP</small>' : "")}</div>
      </div>`).join("");
    }).join("") || '<p class="muted">Nessun atleta ancora…</p>'}
    <div class="row" style="margin-top:16px">
      <button class="btn sec small grow" onclick="exportCsv('${code}')">⬇ Esporta CSV</button>
      <button class="btn sec small grow" onclick="copyBoard('${code}')">Copia classifica</button>
      ${h.startAt && !h.closed ? `<button class="btn sec small" onclick="resetTimer('${code}')">azzera timer</button>` : ""}
      <button class="btn sec small" onclick="goFull()">⛶</button>
    </div>`;
}
window.goFull = () => {
  const el = document.documentElement;
  if (document.fullscreenElement) document.exitFullscreen();
  else if (el.requestFullscreen) el.requestFullscreen();
};
function boardRows(code) {
  const h = getHeat(code); if (!h) return [];
  const srt = (x, y) => {
    if (x.fin != null && y.fin != null) return x.fin - y.fin;
    if (x.fin != null) return -1;
    if (y.fin != null) return 1;
    return y.r - x.r;
  };
  const out = [];
  [...CATS.map(c => c[0]), ""].forEach(cv => {
    const rows = h.athletes.filter(a => catOk(a.cat) === cv)
      .map(a => { const c = h.counts[a.id] || { r: 0 }; return { name: a.name, cat: cv, r: c.r | 0, fin: (c.fin != null) ? c.fin : null }; })
      .sort(srt);
    rows.forEach((r, i) => { r.pos = i + 1; out.push(r); });
  });
  return out;
}
window.exportCsv = (code) => {
  const h = getHeat(code);
  const rows = boardRows(code);
  const capd = h && capReached(h) && h.wod === "fortime";
  const csv = "Categoria;Posizione;Atleta;Reps;Tempo\r\n" + rows.map(a => (a.cat ? a.cat.toUpperCase() : "") + ";" + a.pos + ';"' + a.name.replace(/"/g, '""') + '";' + a.r + ";" + (a.fin != null ? fmtMs(a.fin) : (capd ? "CAP" : ""))).join("\r\n") + "\r\n";
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const aEl = document.createElement("a");
  aEl.href = URL.createObjectURL(blob);
  aEl.download = "contarep_" + (h && h.name ? h.name.replace(/[^\w\- ]+/g, "").trim().replace(/\s+/g, "_") + "_" : "") + code + ".csv";
  document.body.appendChild(aEl); aEl.click(); aEl.remove();
  toast("CSV esportato");
};
window.copyBoard = async (code) => {
  const h = getHeat(code);
  const rows = boardRows(code);
  const txt = (h && h.name ? h.name + "\n" : "") + rows.map(a => (a.cat ? "[" + a.cat.toUpperCase() + "] " : "") + a.pos + ". " + a.name + " — " + (a.fin != null ? fmtMs(a.fin) : a.r + " rep")).join("\n");
  try { await navigator.clipboard.writeText(txt); toast("Classifica copiata"); } catch (e) { toast("Copia non riuscita"); }
};

function vSetup(code) {
  const h = ensureHeat(code); save();
  ensureSync(code);
  app().innerHTML = `
    ${header("h/" + code)}
    <h2>Modifica heat</h2>
    <div class="card">
      <input type="text" id="hname" placeholder="Nome heat" maxlength="40" value="${esc(h.name)}">
      <h3 style="margin-top:16px">Tipo di WOD</h3>
      <div class="seg" id="wodseg">
        <button type="button" data-w="fortime" class="${h.wod !== "amrap" && h.wod !== "emom" ? "on" : ""}" onclick="segPick(this)">⏱ FOR TIME<span>i giudici fermano il tempo</span></button>
        <button type="button" data-w="amrap" class="${h.wod === "amrap" ? "on" : ""}" onclick="segPick(this)">🔁 AMRAP<span>rep in tempo fisso</span></button>
        <button type="button" data-w="emom" class="${h.wod === "emom" ? "on" : ""}" onclick="segPick(this)">⏲ EMOM<span>un esercizio al minuto</span></button>
      </div>
      <h3 style="margin-top:16px">Scaletta WOD <span class="muted" style="font-weight:400;font-size:13px">(una riga per movimento)</span></h3>
      <textarea id="wodtxt" maxlength="800">${esc(h.wodTxt || "")}</textarea>
      <h3 style="margin-top:16px">Time cap</h3>
      <input type="text" id="capmin" inputmode="numeric" placeholder="Minuti (vuoto = nessun cap)" value="${h.capMin || ""}">
      <h3 style="margin-top:16px">Atleti</h3>
      <div id="athletes">
        ${h.athletes.map(a => `<div class="athrow" data-aid="${a.id}">
          <input type="text" class="grow athname" maxlength="30" value="${esc(a.name)}">
          <select class="athcat">${CATS.map(c => `<option value="${c[0]}" ${catOk(a.cat) === c[0] ? "selected" : ""}>${c[1]}</option>`).join("")}</select>
          <button class="btn sec small" onclick="this.parentNode.remove()">✕</button>
        </div>`).join("")}
      </div>
      <button class="btn sec small" onclick="addAthRow()">+ aggiungi atleta</button>
      <button class="btn" style="margin-top:14px" onclick="saveSetup('${code}')">Salva modifiche</button>
      <p class="muted" style="margin-top:10px">Rimuovere un atleta ne elimina anche il conteggio. Le rep già contate degli altri restano.</p>
    </div>`;
}
window.saveSetup = (code) => {
  const h = getHeat(code); if (!h) return;
  h.name = (document.getElementById("hname").value || "").trim();
  const rows = [...document.querySelectorAll("#athletes .athrow")];
  const ath = [];
  rows.forEach(r => {
    const nm = r.querySelector(".athname").value.trim();
    if (!nm) return;
    const aid = r.dataset.aid || newId();
    ath.push({ id: aid, name: nm, cat: catOk(r.querySelector(".athcat") && r.querySelector(".athcat").value) });
  });
  if (!ath.length) { toast("Serve almeno un atleta"); return; }
  h.athletes = ath;
  const seg = document.querySelector("#wodseg .on");
  if (seg) h.wod = (seg.dataset.w === "amrap" || seg.dataset.w === "emom") ? seg.dataset.w : "fortime";
  h.wodTxt = (document.getElementById("wodtxt").value || "").trim();
  h.steps = parseSteps(h.wodTxt);
  const cmS = parseInt(document.getElementById("capmin").value, 10);
  h.capMin = (cmS > 0 && cmS <= 240) ? cmS : null;
  const keep = {};
  ath.forEach(a => keep[a.id] = 1);
  for (const k in h.counts) if (!keep[k]) delete h.counts[k];
  bumpMeta(h);
  toast("Salvato");
  nav("h/" + code);
};

/* ---------- render ---------- */
let pendingRender = false;
function uiBusy() {
  const ae = document.activeElement;
  return !!(ae && (ae.tagName === "SELECT" || ae.tagName === "INPUT" || ae.tagName === "TEXTAREA") && app().contains(ae));
}
function render(force) {
  if (!force && uiBusy()) { pendingRender = true; return; } // niente ridisegni sotto le dita
  pendingRender = false;
  const r = route();
  lastView = r.v + "/" + (r.code || "");
  try { window.scrollTo(0, 0); } catch (e) {}
  if (r.v === "home") { disconnect(); vHome(); }
  else if (r.v === "new") { vNew(); }
  else if (r.v === "hub") vHub(r.code);
  else if (r.v === "judge") vJudge(r.code, r.aid);
  else if (r.v === "grid") vGrid(r.code);
  else if (r.v === "board") vBoard(r.code);
  else if (r.v === "setup") vSetup(r.code);
  else vHome();
}
window.nav = nav;
window.addRep = addRep;
document.addEventListener("focusout", () => {
  if (pendingRender) setTimeout(() => { if (pendingRender && !uiBusy()) render(); }, 120);
});
render();
let phHeat = "", phVal = "";
setInterval(() => {
  if (pendingRender && !uiBusy()) { render(); return; }
  // transizioni di fase del WOD: via / time cap
  const cur = connCode ? getHeat(connCode) : null;
  if (cur) {
    const v = heatPhase(cur);
    if (phHeat !== connCode) { phHeat = connCode; phVal = v; }
    else if (v !== phVal) {
      phVal = v;
      if (v === "run") { // VIA!
        if (navigator.vibrate) { try { navigator.vibrate([120, 60, 120, 60, 250]); } catch (e) {} }
        beep(3); render();
      } else if (v === "cap") { // TIME CAP
        if (navigator.vibrate) { try { navigator.vibrate([400, 100, 400]); } catch (e) {} }
        beep(4); render();
      } else render();
    }
  } else { phHeat = ""; phVal = ""; }
  document.querySelectorAll("[data-tick]").forEach(el => {
    const st = +el.dataset.tick;
    if (st) el.textContent = tickTxt(st, +el.dataset.cap || 0);
  });
  document.querySelectorAll("[data-emom]").forEach(box => {
    const start = +box.dataset.emom, n = +box.dataset.n || 1;
    if (!start || Date.now() < start) return;
    const elMin = Math.floor((Date.now() - start) / 60000);
    const idx = elMin % n;
    const head = box.querySelector(".wodhead");
    if (head) head.textContent = "📋 EMOM — minuto " + (elMin + 1);
    const lis = box.querySelectorAll("li");
    lis.forEach((li, i) => li.classList.toggle("cur", i === idx));
    const wc = box.querySelector(".wodcur");
    if (wc && lis[idx]) wc.textContent = "▶ " + (lis[idx].dataset.lb || "");
  });
}, 250);
loadLib(() => { if (connCode) connect(connCode); }); // precarica la libreria di sync
</script>
